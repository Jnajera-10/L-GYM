services:
  - type: web
    name: gymsystem
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gymsystem-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: gymsystem-db
    databaseName: gymsystem
    plan: free
