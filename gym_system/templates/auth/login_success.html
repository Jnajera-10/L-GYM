<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso exitoso — Body-Fit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{
  background:#070714;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Inter',sans-serif;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.06) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 80%,rgba(139,92,246,0.04) 0%,transparent 60%);
}
.screen{
  width:500px;max-width:96vw;
  padding:40px 38px 32px;
  background:linear-gradient(160deg,#0d0d2b 0%,#0a0a1f 60%,#060612 100%);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:24px;
  position:relative;overflow:hidden;
}
.screen::before{
  content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(99,102,241,0.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.inner{position:relative;z-index:1}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(99,102,241,0.12);
  border:1px solid rgba(99,102,241,0.25);
  color:#a5b4fc;font-size:11px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:4px 12px;border-radius:100px;margin-bottom:18px;
}
.badge-dot{
  width:6px;height:6px;background:#818cf8;border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}
h1{color:#fff;font-size:26px;font-weight:800;line-height:1.2;margin-bottom:4px;letter-spacing:-0.4px}
h1 .name{
  background:linear-gradient(90deg,#818cf8,#c4b5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sub{color:#6b7280;font-size:13px;font-weight:400;margin-bottom:22px}
.canvas-wrap{
  border-radius:16px;overflow:hidden;
  background:#050510;
  border:1px solid rgba(255,255,255,0.05);
  position:relative;
}
canvas{display:block;width:100%;height:auto}
.floor-glow{
  position:absolute;bottom:40px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.5),transparent);
  pointer-events:none;
}
.celebrate{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;opacity:0;
  transition:opacity 0.35s ease;pointer-events:none;
}
.celebrate .big{
  font-size:42px;font-weight:800;color:#fff;letter-spacing:-1px;
  text-shadow:0 0 40px rgba(129,140,248,0.9),0 0 80px rgba(99,102,241,0.4);
}
.celebrate .sub2{
  font-size:12px;color:#a5b4fc;font-weight:600;
  margin-top:6px;letter-spacing:0.12em;text-transform:uppercase;
}
.prog-section{margin-top:18px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-label{color:#4b5563;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.prog-pct{color:#818cf8;font-size:12px;font-weight:700}
.prog-track{height:3px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:visible;position:relative}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#a78bfa);
  border-radius:100px;
  transition:width 0.1s linear;
  position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:-4px;top:-3px;
  width:9px;height:9px;background:#c4b5fd;border-radius:50%;
  box-shadow:0 0 10px #818cf8,0 0 20px rgba(129,140,248,0.5);
}
</style>
</head>
<body>
<div class="screen">
  <div class="inner">
    <div class="badge"><span class="badge-dot"></span>Body-Fit Pro</div>
    <h1>¡Bienvenido, <span class="name" id="uname">{{ username }}</span>!</h1>
    <p class="sub" id="sub-label">Preparando tu sesión...</p>
    <div class="canvas-wrap">
      <canvas id="gc" width="840" height="480"></canvas>
      <div class="floor-glow"></div>
      <div class="celebrate" id="cel">
        <div class="big" id="cel-txt"></div>
        <div class="sub2" id="cel-sub"></div>
      </div>
    </div>
    <div class="prog-section">
      <div class="prog-top">
        <span class="prog-label" id="prog-label">Iniciando...</span>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let timers=[], raf=null;
let mode = Math.random()<0.5 ? 'bench' : 'squat';
let progress=0, targetProgress=0;
let repCount=0, celebrating=false;

const redirectUrl = "{{ redirect_url }}";

function later(fn,ms){ timers.push(setTimeout(fn,ms)); }
function clearAll(){ timers.forEach(clearTimeout); timers=[]; if(raf) cancelAnimationFrame(raf); }
function eio(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
function lerp(a,b,t){ return a+(b-a)*t; }

function setProgress(pct){
  document.getElementById('prog-fill').style.width = Math.min(pct,100)+'%';
  document.getElementById('prog-pct').textContent = Math.round(Math.min(pct,100))+'%';
}

function showCelebrate(txt,sub){
  const el=document.getElementById('cel');
  document.getElementById('cel-txt').textContent=txt;
  document.getElementById('cel-sub').textContent=sub;
  el.style.opacity='1';
  later(()=>{ el.style.opacity='0'; },2000);
}

const C={
  skin:'#e8b98a', skinD:'#c9945c',
  shirt:'#4f46e5', shirtL:'#6366f1',
  pants:'#1e3a5f', pantsD:'#152d4a',
  shoes:'#1c1c2e',
  bar:'#b0b8c8', barS:'#dde3ef',
  dRed:'#dc2626', dRedD:'#991b1b',
  dSil:'#94a3b8',
  bench:'#78350f', benchL:'#92400e', benchLeg:'#451a03'
};

let sweat=[];
function addSweat(x,y){
  for(let i=0;i<4;i++){
    sweat.push({x,y,vx:(Math.random()-0.5)*2,vy:-Math.random()*2.5-0.5,life:1,r:Math.random()*2+0.8});
  }
}

function rr(x,y,w,h,r,fill,stroke,lw){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1.5;ctx.stroke();}
}

function disc(cx,cy,rx,ry,c1,c2){
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=c1;ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,cy,rx*.55,ry*.55,0,0,Math.PI*2);ctx.fillStyle=c2;ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;ctx.stroke();
}

function drawBar(x1,y,x2,dr){
  ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);
  ctx.strokeStyle=C.bar;ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1+dr*2,y-1.5);ctx.lineTo(x2-dr*2,y-1.5);
  ctx.strokeStyle=C.barS;ctx.lineWidth=2.5;ctx.stroke();
  disc(x1+18,y,dr,dr*1.6,C.dRed,C.dRedD);
  disc(x1+6,y,dr*.65,dr*1.15,C.dSil,'#64748b');
  disc(x2-18,y,dr,dr*1.6,C.dRed,C.dRedD);
  disc(x2-6,y,dr*.65,dr*1.15,C.dSil,'#64748b');
}

function head(cx,cy,r,strain){
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=C.skin;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy-r*.35,r*.72,Math.PI,0);ctx.fillStyle='#2d1b0e';ctx.fill();
  [{dx:-.28,dy:-.06},{dx:.28,dy:-.06}].forEach(e=>{
    ctx.beginPath();ctx.arc(cx+r*e.dx,cy+r*e.dy,r*.1,0,Math.PI*2);ctx.fillStyle='#1c1c2e';ctx.fill();
  });
  if(strain>.3){
    ctx.beginPath();ctx.arc(cx,cy+r*.22,r*.22,0.15,Math.PI-.15);
    ctx.strokeStyle='#7c3f2e';ctx.lineWidth=2.5;ctx.stroke();
    const sv=strain*2.5;
    [[-1,-.1,-.38,-.5],[1,.1,.38,-.5]].forEach(v=>{
      ctx.beginPath();ctx.moveTo(cx+r*v[1],cy+r*v[2]*.5);ctx.lineTo(cx+r*v[2],cy+r*v[3]);
      ctx.strokeStyle='#b07050';ctx.lineWidth=sv;ctx.lineCap='round';ctx.stroke();
    });
  }
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.stroke();
}

let BS={ext:1}, SS={d:0};

function drawBench(){
  const cx=W/2, fl=H-70;
  const bW=270,bH=24, bX=cx-bW/2, bY=fl-65, hy=bY-32;

  rr(bX,bY,bW,bH,7,C.benchL);
  ctx.beginPath();ctx.moveTo(bX+50,bY+bH);ctx.lineTo(bX+50,fl);
  ctx.moveTo(bX+bW-50,bY+bH);ctx.lineTo(bX+bW-50,fl);
  ctx.strokeStyle=C.benchLeg;ctx.lineWidth=18;ctx.lineCap='round';ctx.stroke();
  rr(bX,bY,bW,bH,7,null,'rgba(0,0,0,0.35)',1.5);

  const lx=bX+55, fx=lx-28;
  ctx.beginPath();ctx.moveTo(lx-8,hy+10);ctx.lineTo(lx-8,bY+bH*.6);
  ctx.strokeStyle=C.pantsD;ctx.lineWidth=32;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(lx-8,bY+bH*.6);ctx.lineTo(fx,fl);ctx.stroke();
  ctx.beginPath();ctx.ellipse(fx,fl,14,7,-.15,0,Math.PI*2);ctx.fillStyle=C.shoes;ctx.fill();

  rr(bX+48,hy-14,bW-100,40,12,C.shirt);
  ctx.beginPath();ctx.ellipse(bX+105,hy,20,11,0,0,Math.PI*2);
  ctx.fillStyle='rgba(99,102,241,0.45)';ctx.fill();
  ctx.beginPath();ctx.ellipse(bX+bW-155,hy,20,11,0,0,Math.PI*2);ctx.fill();
  rr(bX+48,hy-14,bW-100,40,12,null,C.shirtL,1);

  const ae=BS.ext;
  const aLen=lerp(16,46,ae);
  const barY=hy-aLen-6;
  const aLX=bX+74, aRX=bX+bW-94;
  ctx.beginPath();ctx.moveTo(aLX,hy-6);ctx.lineTo(aLX,barY);
  ctx.strokeStyle=C.skin;ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(aRX,hy-6);ctx.lineTo(aRX,barY);ctx.stroke();
  ctx.beginPath();ctx.arc(aLX,hy-6,8,0,Math.PI*2);ctx.fillStyle=C.skin;ctx.fill();
  ctx.beginPath();ctx.arc(aRX,hy-6,8,0,Math.PI*2);ctx.fill();

  drawBar(cx-170,barY,cx+170,15);

  ctx.save();
  ctx.translate(bX+bW-28,hy-4);ctx.rotate(lerp(0,-.18,ae));
  head(0,0,24,1-ae);ctx.restore();

  if(1-ae>.35) addSweat(bX+bW-10,hy-22);
}

function drawSquat(){
  const cx=W/2, fl=H-70;
  const d=SS.d;
  const drop=lerp(0,75,d);
  const hipY=fl-130+drop;
  const lean=lerp(0,.25,d);
  const kSpread=lerp(55,105,d);
  const kY=hipY+lerp(45,22,d);

  ctx.save();ctx.translate(cx,hipY);ctx.rotate(lean*.6);
  rr(-30,-58,60,62,12,C.shirt);
  ctx.beginPath();ctx.ellipse(-15,-32,16,10,0,0,Math.PI*2);
  ctx.fillStyle='rgba(99,102,241,0.45)';ctx.fill();
  ctx.beginPath();ctx.ellipse(15,-32,16,10,0,0,Math.PI*2);ctx.fill();
  rr(-30,-58,60,62,12,null,C.shirtL,1);
  ctx.restore();

  ctx.save();ctx.translate(cx,hipY);ctx.rotate(-lean*.3);
  head(0,-76,25,d);ctx.restore();

  const barY2=hipY-52+lean*10;
  ctx.save();ctx.translate(cx,hipY);ctx.rotate(lean*.6);
  ctx.beginPath();ctx.moveTo(-34,-12);ctx.lineTo(-185,-60);
  ctx.strokeStyle=C.skin;ctx.lineWidth=15;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(34,-12);ctx.lineTo(185,-60);ctx.stroke();
  ctx.restore();
  drawBar(cx-200,barY2,cx+200,18);

  const lkx=cx-kSpread, rkx=cx+kSpread;
  const lfx=cx-lerp(65,120,d), rfx=cx+lerp(65,120,d);

  ctx.beginPath();ctx.moveTo(cx-30,hipY+6);ctx.lineTo(lkx,kY);
  ctx.strokeStyle=C.pants;ctx.lineWidth=34;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+30,hipY+6);ctx.lineTo(rkx,kY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(lkx,kY);ctx.lineTo(lfx,fl);
  ctx.strokeStyle=C.pantsD;ctx.lineWidth=28;ctx.stroke();
  ctx.beginPath();ctx.moveTo(rkx,kY);ctx.lineTo(rfx,fl);ctx.stroke();
  ctx.beginPath();ctx.ellipse(lfx,fl,22,9,.2,0,Math.PI*2);ctx.fillStyle=C.shoes;ctx.fill();
  ctx.beginPath();ctx.ellipse(rfx,fl,22,9,-.2,0,Math.PI*2);ctx.fill();

  if(d>.45) addSweat(cx+12,hipY-82);
}

function drawBG(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  [[.5,.28,99,102,241,180],[.15,.72,79,70,220,160],[.85,.5,129,100,241,140]].forEach(g=>{
    const gr=ctx.createRadialGradient(W*g[0],H*g[1],0,W*g[0],H*g[1],g[5]);
    gr.addColorStop(0,`rgba(${g[2]},${g[3]},${g[4]},.07)`);gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  });
  const fl=H-70;
  ctx.beginPath();ctx.moveTo(0,fl);ctx.lineTo(W,fl);
  ctx.strokeStyle='rgba(99,102,241,0.18)';ctx.lineWidth=1;ctx.stroke();
  for(let x=0;x<W;x+=55){
    ctx.beginPath();ctx.moveTo(x,fl);ctx.lineTo(x+35,H);
    ctx.strokeStyle='rgba(99,102,241,0.04)';ctx.lineWidth=1;ctx.stroke();
  }
  const rg=ctx.createRadialGradient(W/2,fl-5,0,W/2,fl-5,130);
  rg.addColorStop(0,'rgba(99,102,241,0.1)');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(W/2-130,fl-130,260,130);
}

function drawSweatParts(){
  sweat=sweat.filter(p=>p.life>0);
  sweat.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(147,197,253,${p.life*.55})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.04;
  });
}

function drawReps(){
  if(!repCount) return;
  ctx.fillStyle='rgba(165,180,252,0.85)';
  ctx.font='700 18px Inter,sans-serif';ctx.textAlign='right';
  ctx.fillText(`${repCount} / 3`,W-28,46);ctx.textAlign='left';
}

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  progress+=(targetProgress-progress)*.07;
  setProgress(progress);
  drawBG();
  if(mode==='bench') drawBench(); else drawSquat();
  drawSweatParts();drawReps();
  raf=requestAnimationFrame(loop);
}

function animVal(obj,key,from,to,dur,cb){
  const s=performance.now();
  (function step(now){
    const t=Math.min((now-s)/dur,1);
    obj[key]=lerp(from,to,eio(t));
    if(t<1) requestAnimationFrame(step); else if(cb) cb();
  })(s);
}

function doRep(delay,onDone){
  later(()=>{
    const inD=mode==='bench'?560:640, outD=mode==='bench'?520:580;
    const st=mode==='bench'?BS:SS, k=mode==='bench'?'ext':'d';
    animVal(st,k,1,0,inD,()=>{
      later(()=>{ animVal(st,k,0,1,outD,()=>{ repCount++; if(onDone)onDone(); }); },180);
    });
  },delay);
}

function start(){
  document.getElementById('sub-label').textContent=
    mode==='bench'?'Press banca — ¡a romper récords!':'Sentadilla — ¡profunda y potente!';
  document.getElementById('prog-label').textContent=
    mode==='bench'?'Cargando press banca...':'Cargando sentadilla...';
  repCount=0;progress=0;targetProgress=0;
  BS.ext=1;SS.d=0;sweat=[];
  document.getElementById('cel').style.opacity='0';
  lastT=performance.now();
  raf=requestAnimationFrame(loop);
  later(()=>targetProgress=25,150);
  doRep(280,()=>{
    targetProgress=55;
    doRep(1050,()=>{
      targetProgress=82;
      doRep(1950,()=>{
        targetProgress=100;
        later(()=>{
          cancelAnimationFrame(raf);
          const txt=mode==='bench'?'¡RÉCORD PERSONAL!':'¡SESIÓN BRUTAL!';
          const sub=mode==='bench'?'Press banca completado':'Sentadilla perfecta';
          showCelebrate(txt,sub);
          later(()=>{ window.location.href=redirectUrl; },2000);
        },400);
      });
    });
  });
}

start();
</script>
</body>
</html>
