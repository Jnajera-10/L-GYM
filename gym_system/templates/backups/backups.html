{% extends "layouts/base.html" %}
{% block title %}Respaldos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="fas fa-database me-2"></i>Respaldos del Sistema</h4>
    <form method="POST" action="{{ url_for('backup.create') }}">
        <button type="submit" class="btn btn-primary"><i class="fas fa-download me-1"></i>Crear Respaldo</button>
    </form>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        {% if backups %}
        <ul class="list-group">
            {% for b in backups %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span><i class="fas fa-file-archive me-2 text-muted"></i>{{ b }}</span>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-muted text-center py-3">No hay respaldos disponibles.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
