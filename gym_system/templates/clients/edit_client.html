{% extends "layouts/base.html" %}
{% block title %}Editar Cliente - Body-Fit{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="fas fa-user-edit me-2"></i>Editar Cliente</h4>
    <a href="{{ url_for('clients.index') }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Volver
    </a>
</div>
<div class="card shadow-sm" style="max-width:600px">
    <div class="card-body">
        <form method="POST" action="{{ url_for('clients.edit', client_id=client.id) }}">
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre Completo *</label>
                <input type="text" name="full_name" class="form-control" value="{{ client.full_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="text" name="phone" class="form-control" value="{{ client.phone or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" class="form-control" value="{{ client.email or '' }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i>Guardar Cambios
                </button>
                <a href="{{ url_for('clients.index') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
